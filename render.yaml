# Render Blueprint — Cortex Backend
# Deploy this file to render.com via "New Blueprint" → Connect your GitHub repo

services:
  - type: web
    name: cortex-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/health

    # Auto-deploy on every push to main
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # Your Neon PostgreSQL connection string — set manually in Render dashboard → Environment
      # Format: postgresql://<user>:<password>@<host>.neon.tech/<dbname>?sslmode=require
      - key: DB_URL
        sync: false

      # Set these manually in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false

      - key: INITIAL_ADMIN_PASSWORD
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: AFRO_MESSAGE_API_KEY
        sync: false

      - key: AFRO_MESSAGE_SENDER_ID
        value: cortex

      # Your Netlify frontend URL — e.g. https://cortex.netlify.app
      - key: FRONTEND_URL
        sync: false
